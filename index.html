<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Informatika - SMAN 1 Cabangbungin</title>
    <style>
        body { font-family: sans-serif; background: #f0fdf4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 400px; border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .header-icon { width: 70px; margin-bottom: 10px; }
        h1 { color: #1e40af; margin: 5px 0; font-size: 24px; }
        .mapel { color: #16a34a; font-weight: bold; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .box { border: 1px solid #e2e8f0; padding: 10px; border-radius: 10px; }
        .box b { display: block; color: #1e40af; font-size: 18px; }
        .alert { background: #eff6ff; padding: 12px; border-radius: 8px; font-size: 13px; text-align: left; border-left: 4px solid #3b82f6; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 14px; }
        .btn-rules { background: #2563eb; color: white; border: none; cursor: pointer; }
        .btn-start { background: #059669; color: white; border: none; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .btn-start:hover { background: #047857; }
        footer { margin-top: 25px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991108.png" class="header-icon">
        <h1>Ulangan Informatika</h1>
        <div class="mapel">Perangkat Jaringan Komputer</div>
        <div class="grid">
            <div class="box"><b>30</b><small>Soal</small></div>
            <div class="box"><b>90</b><small>Menit</small></div>
            <div class="box"><b>PG</b><small>Pilihan Ganda</small></div>
        </div>
        <div class="alert">⚠️ <b>Penting:</b> Pastikan koneksi stabil. Waktu berjalan otomatis saat tombol mulai ditekan.</div>
        <button class="btn-rules" onclick="alert('1. Dilarang menyontek\n2. Dilarang buka tab lain\n3. Waktu 90 Menit')">📋 Peraturan Mengerjakan</button>
        <input type="text" id="nama" placeholder="Masukkan Nama Lengkap...">
        <select id="kelas">
            <option value="">Pilih Kelas...</option>
            <option value="X">Kelas X</option>
            <option value="XI">Kelas XI</option>
            <option value="XII">Kelas XII</option>
        </select>
        <button class="btn-start" onclick="mulai()">Mulai Ujian</button>
        <footer>by Rusdian Awaludin, S.Kom<br>SMAN 1 Cabangbungin</footer>
    </div>

    <script>
        function mulai() {
            var nama = document.getElementById('nama').value;
            var kelas = document.getElementById('kelas').value;
            if (nama == "" || kelas == "") {
                alert("Woy, isi nama sama kelas dulu bro!");
            } else {
                alert("Selamat mengerjakan, " + nama + "!");
                // Ganti link di bawah ini dengan link Google Form soal lu
                window.location.href = "https://forms.google.com"; 
            }
        }
    </script>
</body>
</html>
